{% extends "sevendyne_admin/base.html" %}
{% load static %}

{% block content %}

<!-- Section: Design Block -->
<section class="" style="width: 120%;margin-top: -3%;margin-left: 0%;">
    
    <div class="px-4 py-5 px-md-5 text-center text-lg-start" >
      <div class="container" style="margin-left:-1%">
        <div class="row gx-lg-5 align-items-center">            
          <div class="col-lg-12 mb-5 mb-lg-0">
            <div class="row">            
              <h3 style="margin-left:25%;margin-top: 3%;color: #2c9792;">Update Candidate Job Status Form</h3>
               <!-- First Card -->
              <div class="col-md-6">
                <div class="card">                  
                  <div class="card-body py-5 px-md-5">
                    <form id="hrmsclientform" method="post" enctype="multipart/form-data" class="ajax">
                      {% csrf_token %}
                      <!-- Phone Number input -->
                      <div class="form-outline mb-4">
                        {{ form.status }}
                        {% if form.status.errors %}
                          <span class="error">{{ form.status.errors.0 }}</span>
                        {% endif %}
                        <label class="form-label">status</label>
                      </div>
      
                  </div>
                  <!-- Submit button -->
                  <button type="submit" class="btn btn-primary btn-block mb-4" onclick="submitForm(event)">
                    Update Candidate Job Status
                  </button> 
                </div>                  
                </form>
              </div>
            </div>            
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Include SweetAlert JS from CDN -->
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

 
<!-- Add JavaScript code to handle form submission and show SweetAlert messages -->
<script>
  function submitForm(event) {
    event.preventDefault();  // Prevent the default form submission behavior
    var form = document.getElementById('hrmsclientform');
    var formData = new FormData(form);
  
    fetch(form.action, {
      method: 'POST',
      body: formData,
    })
    .then(response => response.json())
    .then(data => {  
      // Corrected variable name here
      if (data.status === 'true') {
        showSweetAlert(data.message, data.status, data.redirect_url);
      } else if (data.status === 'form_error') {
        showSweetAlert(data.message, 'form_error');
      } else if (data.status === 'false') {
        showSweetAlert(data.message, data.status);
      } else {
        showSweetAlert(data.message, 'error');
      }
    })
    .catch(error => {
      console.error('Error:', error);
    });
  }
  
  function showSweetAlert(message, status, redirectUrl) {  
    if (status === 'true') {
      Swal.fire({
        icon: 'success',
        title: 'Success!',
        text: message,
        showConfirmButton: true,
        allowOutsideClick: false, // Prevent closing on outside click
  
        didClose: () => {
          if (redirectUrl) {
            // Combine the redirect URL with the current protocol and host to get the full URL
            var fullRedirectUrl = window.location.origin + redirectUrl;
            window.location.href = fullRedirectUrl;
          }
        }
      });
    } else if (status === 'form_error') {
      Swal.fire({
        icon: 'error',
        title: 'Form Validation Error!',
        html: message,  // Display form errors as HTML
        showConfirmButton: true,
        allowOutsideClick: false,
      });
    } else if (status === 'false') {
      Swal.fire({
        icon: 'error',
        title: 'Form Error!',
        text: 'Error: ' + message,
        showConfirmButton: true,
        allowOutsideClick: false, // Prevent closing on outside click
      });
    } else {
      Swal.fire({
        icon: 'error',
        title: 'Error!',
        text: 'Error: ' + message,
        showConfirmButton: true,
        allowOutsideClick: false, // Prevent closing on outside click
      });
    }
  }
  
</script>

{% endblock %}
